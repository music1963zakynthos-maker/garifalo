    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #ff0000; /* Πολύ σκούρο φόντο για να ξεχωρίζει το φως */
        }

        .container {
            width: 60%;
            height: 70%;
            border-radius: 20px;
            overflow: hidden;
            border: 2px solid rgba(100, 200, 255, 0.5); /* Χρώμα περιγράμματος */
            
            /* Εδώ μπαίνει το εφέ του φωτός (Glow) */
            box-shadow: 0 0 20px rgba(100, 200, 255, 0.3), 
                        0 0 40px rgba(100, 200, 255, 0.2);

            /* Το animation: 6 δευτερόλεπτα διάρκεια, αργό ξεκίνημα */
            animation: slowZoomGlow 22s ease-out forwards;
        }
		/* Προσθήκη στο υπάρχον .container */
.container {
    /* ... υπάρχοντα styles ... */
    animation: slowZoomGlow 22s ease-out forwards, flip 2s ease-in-out 22s forwards;
}

/* Το νέο animation για την κωλοτούμπα */
@keyframes flip {
    from { transform: scale(1) rotate(0deg); }
    to { transform: scale(1) rotate(360deg); }
}

        @keyframes slowZoomGlow {
            from { 
                opacity: 0; 
                transform: scale(0.3); /* Ξεκινάει πολύ μικρό */
                box-shadow: 0 0 0px rgba(100, 200, 255, 0); 
            }
            to { 
                opacity: 1; 
                transform: scale(1);   /* Καταλήγει κανονικό */
                box-shadow: 0 0 30px rgba(100, 200, 255, 0.6), 
                            0 0 60px rgba(100, 200, 255, 0.3); /* Δυναμώνει το φως */
            }
        }
		  body::after {content: "";position: fixed;top: 0;left: 0;width: 100%;height: 100%;background-color: rgba(0, 0, 0, 0.7);z-index: -1;}
